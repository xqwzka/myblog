<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台登录</title>
  <style>
    :root {
      --bg: #f7f3eb;
      --card: #fffdf8;
      --ink: #163047;
      --line: #e8dcc8;
      --accent: #f2542d;
      --soft: #5f7689;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, #ffe0c7 0%, transparent 26%),
        radial-gradient(circle at 80% 80%, #d7efe3 0%, transparent 24%),
        var(--bg);
      color: var(--ink);
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .card {
      width: min(420px, 92vw);
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 18px 48px rgba(19, 41, 61, .08);
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 0 0 18px; color: var(--soft); line-height: 1.6; }
    form { display: grid; gap: 14px; }
    label { display: grid; gap: 8px; font-size: 14px; font-weight: 700; }
    input {
      width: 100%;
      border: 2px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
      background: #fff;
    }
    input:focus { border-color: var(--accent); }
    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
    }
    .error {
      min-height: 22px;
      color: #c0392b;
      font-size: 14px;
    }
    .tips {
      margin-top: 14px;
      font-size: 13px;
      color: var(--soft);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>后台登录</h1>
    <p>请输入后台账号和密码后再进入管理页面。</p>
    <form id="loginForm">
      <input type="hidden" id="next" name="next" value="/admin" />
      <label>
        账号
        <input id="username" name="username" type="text" autocomplete="username" required />
      </label>
      <label>
        密码
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </label>
      <div class="error" id="errorText"></div>
      <button type="submit" id="submitBtn">登录后台</button>
    </form>
    <div class="tips">登录成功后会自动跳转回后台页面。</div>
  </main>
  <script>
    const form = document.getElementById('loginForm');
    const errorText = document.getElementById('errorText');
    const nextInput = document.getElementById('next');
    const submitBtn = document.getElementById('submitBtn');

    const params = new URLSearchParams(location.search);
    nextInput.value = params.get('next') || '/admin';
    if (params.get('error')) errorText.textContent = '账号或密码不正确';

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorText.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = '登录中...';
      try {
        const payload = {
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value,
          next: nextInput.value || '/admin'
        };
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '登录失败');
        location.href = data.next || '/admin';
      } catch (error) {
        errorText.textContent = error.message;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '登录后台';
      }
    });
  </script>
</body>
</html>
