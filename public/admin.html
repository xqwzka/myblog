<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台管理</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --ink: #13293d;
      --accent: #f2542d;
      --accent-2: #0b6e4f;
      --card: #fffdf8;
      --line: #e7ddcd;
      --soft: #31526b;
      --warn: #a21d1d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 90% 8%, #ffdcc7 0%, transparent 31%),
        radial-gradient(circle at 5% 92%, #cbe8da 0%, transparent 29%),
        var(--bg);
      min-height: 100vh;
    }

    .wrap {
      width: min(1160px, 92vw);
      margin: 36px auto 72px;
    }

    .hero {
      border: 2px solid var(--ink);
      background: linear-gradient(135deg, #fff8ea, #fff);
      border-radius: 20px;
      padding: 30px 26px;
      box-shadow: 10px 10px 0 #13293d22;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .tag {
      display: inline-block;
      border: 2px solid var(--ink);
      border-radius: 999px;
      padding: 4px 12px;
      font-weight: 700;
      background: #fff;
      margin-bottom: 10px;
    }

    .home-link {
      border: 2px solid var(--ink);
      color: var(--ink);
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 12px;
      font-weight: 700;
      background: #fff;
      transition: transform .15s ease;
    }

    .home-link:hover { transform: translateY(-2px); }

    h1 {
      margin: 6px 0 8px;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.05;
    }

    .sub {
      margin: 0;
      font-size: 16px;
      color: var(--soft);
      line-height: 1.6;
    }

    .layout {
      margin-top: 20px;
      display: grid;
      gap: 14px;
      grid-template-columns: 1fr 1fr;
    }

    .card {
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      transition: .2s ease;
    }

    .card:hover {
      border-color: var(--ink);
      transform: translateY(-2px);
    }

    .span-2 { grid-column: span 2; }

    .card h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .form-row {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
    }

    label {
      font-size: 13px;
      font-weight: 700;
      color: #2f4d65;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 2px solid #d7cebf;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      color: var(--ink);
      background: #fff;
      outline: none;
      font-family: inherit;
      display: block;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--ink);
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: 2px solid var(--ink);
      background: #fff;
      color: var(--ink);
      font-size: 14px;
      padding: 8px 14px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform .15s ease, background .2s ease;
      font-weight: 700;
      font-family: inherit;
    }

    button:hover { transform: translateY(-2px); }

    .primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .status {
      margin-top: 10px;
      min-height: 22px;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-2);
    }

    .danger { color: var(--warn); }

    .item-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
      max-height: 420px;
      overflow: auto;
    }

    .item {
      border: 1px solid #e7dece;
      background: #fff;
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      line-height: 1.5;
      display: grid;
      gap: 8px;
    }

    .item-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .item-title {
      font-weight: 700;
      color: #1b3650;
    }

    .item-sub {
      font-size: 12px;
      color: #5b768a;
    }

    .item-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .link-btn {
      border: 1px solid #2e4d66;
      color: #2e4d66;
      background: #fff;
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 9px;
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
    }

    .danger-btn {
      border: 1px solid var(--warn);
      color: var(--warn);
      background: #fff;
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 9px;
      cursor: pointer;
      font-weight: 700;
    }

    .empty {
      border: 2px dashed #d8cfc0;
      border-radius: 12px;
      padding: 12px;
      color: #5a7388;
      background: #fff;
      font-weight: 600;
      font-size: 14px;
    }

    .mode-switch {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mode-chip {
      border: 2px solid #ccbfa9;
      background: #fff;
      color: #31526b;
      border-radius: 10px;
      font-size: 12px;
      padding: 6px 10px;
      cursor: pointer;
      font-weight: 700;
    }

    .mode-chip.active {
      border-color: var(--ink);
      background: #13293d;
      color: #fff;
    }

    .editor-wrap {
      border: 2px solid #d7cebf;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      width: 100%;
    }

    .editor-toolbar {
      display: flex;
      gap: 6px;
      padding: 8px;
      border-bottom: 1px solid #e8dfd0;
      flex-wrap: wrap;
      background: #fff9ef;
    }

    .tool-btn {
      border: 1px solid #ccbfa9;
      border-radius: 8px;
      background: #fff;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      color: #2b4a63;
      line-height: 1.3;
    }

    .editor {
      min-height: 240px;
      padding: 12px;
      outline: none;
      font-size: 15px;
      line-height: 1.7;
      color: #1f3d56;
      width: 100%;
    }

    .editor img {
      max-width: 100%;
      border-radius: 10px;
      display: block;
      margin: 10px 0;
    }

    .editor:empty::before {
      content: attr(data-placeholder);
      color: #7c8f9f;
    }

    .content-textarea {
      min-height: 240px;
      font-family: "JetBrains Mono", "Consolas", monospace;
      line-height: 1.65;
    }

    .editor-area { display: none; width: 100%; }
    .editor-area.active { display: block; }

    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: #6f8799;
      line-height: 1.6;
    }

    @media (max-width: 920px) {
      .layout { grid-template-columns: 1fr; }
      .span-2 { grid-column: span 1; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="topbar">
        <span class="tag">Admin</span>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <a class="home-link" href="/">返回前台展示</a>
          <a class="home-link" href="/logout">退出登录</a>
        </div>
      </div>
      <h1>后台发布管理</h1>
      <p class="sub">可配置网站名称、首页标题和简介；支持发布文章、编辑文章、分类管理、多格式内容与图片上传。</p>
    </section>

    <section class="layout">
      <article class="card span-2">
        <h2>站点设置</h2>
        <form id="settingsForm">
          <div class="form-row">
            <label for="siteName">网站名称（浏览器标题）</label>
            <input id="siteName" name="siteName" type="text" maxlength="60" placeholder="例如：我的内容站" required />
          </div>
          <div class="form-row">
            <label for="homeTitle">首页主标题</label>
            <input id="homeTitle" name="homeTitle" type="text" maxlength="80" placeholder="例如：分类文章展示台" required />
          </div>
          <div class="form-row">
            <label for="homeSubtitle">首页主标题下简介</label>
            <input id="homeSubtitle" name="homeSubtitle" type="text" maxlength="200" placeholder="例如：点击标题可进入文章详情页" required />
          </div>
          <hr style="border:none;border-top:1px solid #eadfce;margin:8px 0 4px;" />
          <div class="form-row">
            <label for="aiBaseUrl">AI 接口地址</label>
            <input id="aiBaseUrl" name="aiBaseUrl" type="url" maxlength="300" placeholder="例如：https://api.azk.us.ci/v1" />
          </div>
          <div class="form-row">
            <label for="aiApiKey">AI API Key</label>
            <input id="aiApiKey" name="aiApiKey" type="text" maxlength="300" placeholder="输入用于文章抓取的 API Key" />
          </div>
          <div class="form-row">
            <label for="aiModel">AI 模型名</label>
            <input id="aiModel" name="aiModel" type="text" maxlength="120" placeholder="例如：gpt-5.4" />
          </div>
          <button class="primary" type="submit">保存站点设置</button>
        </form>
        <div id="settingsStatus" class="status"></div>
      </article>

      <article class="card">
        <h2>新增分类</h2>
        <form id="categoryForm">
          <div class="form-row">
            <label for="categoryName">分类名称</label>
            <input id="categoryName" name="categoryName" type="text" maxlength="30" placeholder="例如：运营、公告、案例" required />
          </div>
          <button class="primary" type="submit">保存分类</button>
        </form>
        <div id="categoryStatus" class="status"></div>
      </article>

      <article class="card">
        <h2>分类列表</h2>
        <div id="categoryList" class="item-list"></div>
      </article>

      <article class="card span-2">
        <h2>发布文章</h2>
        <form id="articleForm">
          <div class="form-row">
            <label for="articleTitle">文章标题</label>
            <input id="articleTitle" name="articleTitle" type="text" maxlength="80" placeholder="输入文章标题" required />
          </div>
          <div class="form-row">
            <label for="articleIntro">简介</label>
            <input id="articleIntro" name="articleIntro" type="text" maxlength="220" placeholder="首页标题下方展示的简介文案" />
          </div>
          <div class="form-row">
            <label for="articleSourceUrl">来源链接（可选）</label>
            <input id="articleSourceUrl" name="articleSourceUrl" type="url" maxlength="600" placeholder="例如：https://example.com/tutorial" />
          </div>
          <div class="form-row">
            <label for="importUrl">从外部教程链接导入（自动抓标题和正文）</label>
            <div class="btn-row">
              <input id="importUrl" name="importUrl" type="url" maxlength="600" placeholder="粘贴教程直链后点击导入" />
              <button type="button" id="importFromUrlBtn">AI 抓取并填充</button>
            </div>
          </div>
          <div class="form-row">
            <label for="articleCategory">所属分类</label>
            <select id="articleCategory" name="articleCategory" required></select>
          </div>

          <div class="form-row">
            <label>内容模式</label>
            <div class="mode-switch" id="modeSwitch">
              <button type="button" class="mode-chip active" data-mode="rich">富文本</button>
              <button type="button" class="mode-chip" data-mode="markdown">Markdown</button>
              <button type="button" class="mode-chip" data-mode="html">HTML 源码</button>
              <button type="button" class="mode-chip" data-mode="text">纯文本</button>
            </div>
          </div>

          <div class="form-row">
            <label>文章内容</label>
            <div id="richArea" class="editor-area active">
              <div class="editor-wrap">
                <div class="editor-toolbar" id="richToolbar">
                  <button type="button" class="tool-btn" data-cmd="bold">加粗</button>
                  <button type="button" class="tool-btn" data-cmd="italic">斜体</button>
                  <button type="button" class="tool-btn" data-cmd="underline">下划线</button>
                  <button type="button" class="tool-btn" data-cmd="formatBlock" data-value="H2">H2</button>
                  <button type="button" class="tool-btn" data-cmd="formatBlock" data-value="H3">H3</button>
                  <button type="button" class="tool-btn" data-cmd="insertUnorderedList">无序列表</button>
                  <button type="button" class="tool-btn" data-cmd="insertOrderedList">有序列表</button>
                  <button type="button" class="tool-btn" data-action="blockquote">引用</button>
                  <button type="button" class="tool-btn" data-action="inlineCode">行内代码</button>
                  <button type="button" class="tool-btn" data-action="codeBlock">代码块</button>
                  <button type="button" class="tool-btn" data-action="hr">分割线</button>
                  <button type="button" class="tool-btn" data-action="link">链接</button>
                </div>
                <div id="richEditor" class="editor" contenteditable="true" data-placeholder="输入富文本内容..."></div>
              </div>
            </div>

            <div id="markdownArea" class="editor-area">
              <div class="editor-wrap">
                <div class="editor-toolbar" id="markdownToolbar">
                  <button type="button" class="tool-btn" data-snippet="title">标题</button>
                  <button type="button" class="tool-btn" data-snippet="bold">加粗</button>
                  <button type="button" class="tool-btn" data-snippet="quote">引用</button>
                  <button type="button" class="tool-btn" data-snippet="list">列表</button>
                  <button type="button" class="tool-btn" data-snippet="code">代码块</button>
                  <button type="button" class="tool-btn" data-snippet="table">表格</button>
                  <button type="button" class="tool-btn" data-snippet="link">链接</button>
                </div>
                <textarea id="markdownEditor" class="content-textarea" placeholder="输入 Markdown 内容"></textarea>
              </div>
            </div>

            <div id="htmlArea" class="editor-area">
              <div class="editor-wrap">
                <div class="editor-toolbar" id="htmlToolbar">
                  <button type="button" class="tool-btn" data-template="p">段落</button>
                  <button type="button" class="tool-btn" data-template="h2">标题</button>
                  <button type="button" class="tool-btn" data-template="code">代码块</button>
                  <button type="button" class="tool-btn" data-template="table">表格</button>
                  <button type="button" class="tool-btn" data-template="quote">引用</button>
                </div>
                <textarea id="htmlEditor" class="content-textarea" placeholder="输入 HTML 源码，例如 <pre><code>...</code></pre>"></textarea>
              </div>
            </div>

            <div id="textArea" class="editor-area">
              <textarea id="textEditor" class="content-textarea" placeholder="输入纯文本，详情页将按代码样式展示"></textarea>
            </div>

            <div class="btn-row">
              <button type="button" id="uploadImageBtn">上传图片并插入</button>
              <button type="button" id="clearContentBtn">清空内容</button>
            </div>
            <div class="hint">你圈出的窄编辑区域已修复：当前所有模式编辑器都使用 100% 宽度。导入链接后会自动填充标题、简介和正文。</div>
          </div>

          <button class="primary" type="submit">发布文章</button>
        </form>
        <div id="articleStatus" class="status"></div>
      </article>

      <article class="card span-2">
        <h2>已发布文章</h2>
        <div id="articleList" class="item-list"></div>
      </article>
    </section>
  </main>

  <input type="file" id="imageInput" accept="image/*" hidden />

  <script>
    const state = {
      settings: {},
      categories: [],
      articles: [],
      contentMode: "rich"
    };

    const modeLabel = {
      rich: "富文本",
      markdown: "Markdown",
      html: "HTML",
      text: "纯文本"
    };

    const settingsForm = document.getElementById("settingsForm");
    const settingsStatus = document.getElementById("settingsStatus");
    const categoryForm = document.getElementById("categoryForm");
    const articleForm = document.getElementById("articleForm");
    const categoryStatus = document.getElementById("categoryStatus");
    const articleStatus = document.getElementById("articleStatus");
    const categorySelect = document.getElementById("articleCategory");
    const categoryListEl = document.getElementById("categoryList");
    const articleListEl = document.getElementById("articleList");
    const modeSwitch = document.getElementById("modeSwitch");
    const richArea = document.getElementById("richArea");
    const markdownArea = document.getElementById("markdownArea");
    const htmlArea = document.getElementById("htmlArea");
    const textArea = document.getElementById("textArea");
    const richToolbar = document.getElementById("richToolbar");
    const markdownToolbar = document.getElementById("markdownToolbar");
    const htmlToolbar = document.getElementById("htmlToolbar");
    const richEditor = document.getElementById("richEditor");
    const markdownEditor = document.getElementById("markdownEditor");
    const htmlEditor = document.getElementById("htmlEditor");
    const textEditor = document.getElementById("textEditor");
    const articleSourceUrlInput = document.getElementById("articleSourceUrl");
    const importUrlInput = document.getElementById("importUrl");
    const importFromUrlBtn = document.getElementById("importFromUrlBtn");
    const uploadImageBtn = document.getElementById("uploadImageBtn");
    const clearContentBtn = document.getElementById("clearContentBtn");
    const imageInput = document.getElementById("imageInput");

    function setStatus(target, text, isError = false) {
      target.textContent = text;
      target.classList.toggle("danger", isError);
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleString("zh-CN");
    }

    function insertAtCursor(textarea, text) {
      const start = textarea.selectionStart ?? textarea.value.length;
      const end = textarea.selectionEnd ?? textarea.value.length;
      textarea.value = textarea.value.slice(0, start) + text + textarea.value.slice(end);
      const pos = start + text.length;
      textarea.focus();
      textarea.setSelectionRange(pos, pos);
    }

    function execRichCommand(cmd, value) {
      richEditor.focus();
      document.execCommand(cmd, false, value);
      richEditor.focus();
    }

    function setMode(mode) {
      state.contentMode = mode;
      modeSwitch.querySelectorAll(".mode-chip").forEach((el) => {
        el.classList.toggle("active", el.dataset.mode === mode);
      });
      richArea.classList.toggle("active", mode === "rich");
      markdownArea.classList.toggle("active", mode === "markdown");
      htmlArea.classList.toggle("active", mode === "html");
      textArea.classList.toggle("active", mode === "text");
    }

    function getActiveContent() {
      if (state.contentMode === "rich") return richEditor.innerHTML.trim();
      if (state.contentMode === "markdown") return markdownEditor.value.trim();
      if (state.contentMode === "html") return htmlEditor.value.trim();
      return textEditor.value.trim();
    }

    function clearEditors() {
      richEditor.innerHTML = "";
      markdownEditor.value = "";
      htmlEditor.value = "";
      textEditor.value = "";
    }

    function renderSettings() {
      document.getElementById("siteName").value = state.settings.siteName || "";
      document.getElementById("homeTitle").value = state.settings.homeTitle || "";
      document.getElementById("homeSubtitle").value = state.settings.homeSubtitle || "";
      document.getElementById("aiBaseUrl").value = state.settings.aiBaseUrl || "";
      document.getElementById("aiApiKey").value = state.settings.aiApiKey || "";
      document.getElementById("aiModel").value = state.settings.aiModel || "";
    }

    function renderCategorySelect() {
      categorySelect.innerHTML = "";
      if (!state.categories.length) {
        const op = document.createElement("option");
        op.value = "";
        op.textContent = "请先新增分类";
        categorySelect.appendChild(op);
        categorySelect.disabled = true;
        return;
      }
      categorySelect.disabled = false;
      state.categories.forEach((c) => {
        const op = document.createElement("option");
        op.value = c.id;
        op.textContent = c.name;
        categorySelect.appendChild(op);
      });
    }

    function renderCategoryList() {
      categoryListEl.innerHTML = "";
      if (!state.categories.length) {
        categoryListEl.innerHTML = '<div class="empty">还没有分类，请先创建一个。</div>';
        return;
      }

      state.categories.forEach((category) => {
        const count = state.articles.filter((a) => a.categoryId === category.id).length;
        const item = document.createElement("div");
        item.className = "item";
        item.innerHTML = `
          <div class="item-head">
            <div class="item-title">${escapeHtml(category.name)}</div>
            <div class="item-actions">
              <button type="button" class="danger-btn" data-id="${category.id}">删除分类</button>
            </div>
          </div>
          <div class="item-sub">${count} 篇文章 · 创建于 ${formatDate(category.createdAt)}</div>
        `;
        categoryListEl.appendChild(item);
      });
    }

    function renderArticleList() {
      articleListEl.innerHTML = "";
      if (!state.articles.length) {
        articleListEl.innerHTML = '<div class="empty">还没有文章，发布后会显示在这里。</div>';
        return;
      }

      state.articles
        .slice()
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
        .forEach((article) => {
          const item = document.createElement("div");
          item.className = "item";
          item.innerHTML = `
            <div class="item-head">
              <div class="item-title">${escapeHtml(article.title)}</div>
              <div class="item-actions">
                <a class="link-btn" href="/admin/article/${article.id}/edit">编辑</a>
                <a class="link-btn" href="/article/${article.id}" target="_blank">查看</a>
              </div>
            </div>
            <div class="item-sub">${escapeHtml(article.intro || "暂无简介")}</div>
            ${article.sourceUrl ? `<div class="item-sub">来源：<a href="${escapeHtml(article.sourceUrl)}" target="_blank">${escapeHtml(article.sourceUrl)}</a></div>` : ""}
            <div class="item-sub">${escapeHtml(article.categoryName || "未分类")} · ${modeLabel[article.contentType] || "富文本"} · ${formatDate(article.createdAt)}</div>
          `;
          articleListEl.appendChild(item);
        });
    }

    async function loadData() {
      const res = await fetch("/api/bootstrap");
      if (!res.ok) throw new Error("加载失败");
      const data = await res.json();
      state.settings = data.settings || {};
      state.categories = Array.isArray(data.categories) ? data.categories : [];
      state.articles = Array.isArray(data.articles) ? data.articles : [];
      renderSettings();
      renderCategorySelect();
      renderCategoryList();
      renderArticleList();
    }

    modeSwitch.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) return;
      if (!target.dataset.mode) return;
      setMode(target.dataset.mode);
    });

    richToolbar.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) return;
      const cmd = target.dataset.cmd;
      const value = target.dataset.value;
      const action = target.dataset.action;
      if (cmd) return execRichCommand(cmd, value);
      if (action === "blockquote") return execRichCommand("formatBlock", "BLOCKQUOTE");
      if (action === "hr") return execRichCommand("insertHorizontalRule");
      if (action === "link") {
        const url = window.prompt("请输入链接地址（https://...）");
        if (url) execRichCommand("createLink", url);
        return;
      }
      if (action === "inlineCode") {
        const code = window.prompt("输入行内代码");
        if (code) execRichCommand("insertHTML", `<code>${escapeHtml(code)}</code>`);
        return;
      }
      if (action === "codeBlock") {
        const lang = window.prompt("代码语言（可选）") || "";
        const code = window.prompt("输入代码");
        if (!code) return;
        const cls = lang ? ` class="language-${escapeHtml(lang)}"` : "";
        execRichCommand("insertHTML", `<pre><code${cls}>${escapeHtml(code)}</code></pre>`);
      }
    });

    markdownToolbar.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) return;
      const map = {
        title: "## 二级标题\n",
        bold: "**加粗文本**",
        quote: "> 这里是引用内容\n",
        list: "- 列表项 1\n- 列表项 2\n",
        code: "~~~js\nconsole.log('hello');\n~~~\n",
        table: "| 列1 | 列2 |\n| --- | --- |\n| 内容A | 内容B |\n",
        link: "[链接文字](https://example.com)"
      };
      const snippet = map[target.dataset.snippet] || "";
      if (snippet) insertAtCursor(markdownEditor, snippet);
    });

    htmlToolbar.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) return;
      const map = {
        p: "<p>这里是段落内容</p>\n",
        h2: "<h2>二级标题</h2>\n",
        code: "<pre><code class=\"language-js\">console.log('hello');</code></pre>\n",
        table: "<table><thead><tr><th>列1</th><th>列2</th></tr></thead><tbody><tr><td>A</td><td>B</td></tr></tbody></table>\n",
        quote: "<blockquote>这里是引用内容</blockquote>\n"
      };
      const tpl = map[target.dataset.template] || "";
      if (tpl) insertAtCursor(htmlEditor, tpl);
    });

    uploadImageBtn.addEventListener("click", () => imageInput.click());

    importFromUrlBtn.addEventListener("click", async () => {
      const url = String(importUrlInput.value || articleSourceUrlInput.value || "").trim();
      if (!url) {
        setStatus(articleStatus, "请先输入教程链接", true);
        window.alert("请先输入教程链接");
        return;
      }

      importFromUrlBtn.disabled = true;
      const oldText = importFromUrlBtn.textContent;
      importFromUrlBtn.textContent = "AI 抓取中...";
      setStatus(articleStatus, "AI 抓取中...");
      try {
        const res = await fetch("/api/import-url", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "抓取失败");

        document.getElementById("articleTitle").value = data.title || "";
        document.getElementById("articleIntro").value = data.intro || "";
        articleSourceUrlInput.value = data.sourceUrl || url;
        importUrlInput.value = data.sourceUrl || url;

        clearEditors();
        setMode("rich");
        richEditor.innerHTML = data.content || "";

        const importLabel = data.importMethod === "ai" ? "AI直抓" : data.importMethod === "ai-mirror" ? "镜像+AI净化" : data.importMethod === "mirror" ? "镜像净化回退" : "基础抓取";
        const statusText = data.warning ? `导入成功（${importLabel}）：${data.warning}` : `导入成功（${importLabel}），已自动填充标题和正文`;
        setStatus(articleStatus, statusText);
      } catch (error) {
        setStatus(articleStatus, error.message, true);
        window.alert(error.message);
      } finally {
        importFromUrlBtn.disabled = false;
        importFromUrlBtn.textContent = oldText;
      }
    });

    imageInput.addEventListener("change", async () => {
      const file = imageInput.files && imageInput.files[0];
      if (!file) return;

      setStatus(articleStatus, "图片上传中...");
      try {
        const fd = new FormData();
        fd.append("image", file);
        const res = await fetch("/api/uploads/image", { method: "POST", body: fd });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "上传失败");

        if (state.contentMode === "rich") execRichCommand("insertHTML", `<img src="${data.url}" alt="图片" />`);
        if (state.contentMode === "markdown") insertAtCursor(markdownEditor, `![图片描述](${data.url})`);
        if (state.contentMode === "html") insertAtCursor(htmlEditor, `<img src="${data.url}" alt="图片" />`);
        if (state.contentMode === "text") insertAtCursor(textEditor, data.url);
        setStatus(articleStatus, "图片已插入内容");
      } catch (error) {
        setStatus(articleStatus, error.message, true);
      } finally {
        imageInput.value = "";
      }
    });

    clearContentBtn.addEventListener("click", () => {
      if (state.contentMode === "rich") richEditor.innerHTML = "";
      if (state.contentMode === "markdown") markdownEditor.value = "";
      if (state.contentMode === "html") htmlEditor.value = "";
      if (state.contentMode === "text") textEditor.value = "";
      setStatus(articleStatus, "当前模式内容已清空");
    });

    settingsForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      setStatus(settingsStatus, "保存中...");
      const fd = new FormData(settingsForm);
      const payload = {
        siteName: String(fd.get("siteName") || "").trim(),
        homeTitle: String(fd.get("homeTitle") || "").trim(),
        homeSubtitle: String(fd.get("homeSubtitle") || "").trim(),
        aiBaseUrl: String(fd.get("aiBaseUrl") || "").trim(),
        aiApiKey: String(fd.get("aiApiKey") || "").trim(),
        aiModel: String(fd.get("aiModel") || "").trim()
      };
      try {
        const res = await fetch("/api/settings", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "保存失败");
        state.settings = data || payload;
        renderSettings();
        setStatus(settingsStatus, "站点设置已保存");
      } catch (error) {
        setStatus(settingsStatus, error.message, true);
      }
    });

    categoryForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      setStatus(categoryStatus, "保存中...");
      const fd = new FormData(categoryForm);
      const payload = { name: String(fd.get("categoryName") || "").trim() };
      try {
        const res = await fetch("/api/categories", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "保存失败");
        categoryForm.reset();
        setStatus(categoryStatus, `分类“${data.name}”已创建`);
        await loadData();
      } catch (error) {
        setStatus(categoryStatus, error.message, true);
      }
    });

    categoryListEl.addEventListener("click", async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) return;
      const id = target.dataset.id;
      if (!id) return;
      if (!window.confirm("确定删除该分类吗？分类下有文章时无法删除。")) return;

      setStatus(categoryStatus, "删除中...");
      try {
        const res = await fetch(`/api/categories/${id}`, { method: "DELETE" });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "删除失败");
        setStatus(categoryStatus, "分类已删除");
        await loadData();
      } catch (error) {
        setStatus(categoryStatus, error.message, true);
      }
    });

    articleForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      setStatus(articleStatus, "发布中...");
      const fd = new FormData(articleForm);
      const payload = {
        title: String(fd.get("articleTitle") || "").trim(),
        intro: String(fd.get("articleIntro") || "").trim(),
        sourceUrl: String(fd.get("articleSourceUrl") || "").trim(),
        categoryId: String(fd.get("articleCategory") || "").trim(),
        contentType: state.contentMode,
        content: getActiveContent()
      };
      try {
        const res = await fetch("/api/articles", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "发布失败");
        articleForm.reset();
        clearEditors();
        articleSourceUrlInput.value = "";
        importUrlInput.value = "";
        setMode("rich");
        setStatus(articleStatus, `文章“${data.title}”发布成功`);
        await loadData();
      } catch (error) {
        setStatus(articleStatus, error.message, true);
      }
    });

    (async () => {
      try {
        setMode("rich");
        await loadData();
      } catch (error) {
        setStatus(articleStatus, "初始化失败，请检查服务是否启动。", true);
      }
    })();
  </script>
</body>
</html>
